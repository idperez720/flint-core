name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test-and-lint:
    name: Test and Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load Cached Virtualenv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: >-
            venv-${{ runner.os }}-${{ matrix.python-version }}-${{
            hashFiles('**/pyproject.toml') }}

      - name: Install Project Dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root --all-extras

      - name: Ensure Extras are Installed
        if: steps.cached-poetry-dependencies.outputs.cache-hit == 'true'
        run: poetry install --no-interaction --no-root --all-extras

      - name: Run Ruff Linter Code Check
        run: poetry run ruff check ./flint_core/

      - name: Run Ruff Code Formatter Check
        run: poetry run ruff format --check ./flint_core/

      - name: Run Tests with Strict Coverage Gate (>= 60%)
        run: poetry run pytest --cov=flint_core --cov-fail-under=60

  release:
    name: Automated Semantic Release and PyPI Deploy
    needs: test-and-lint
    runs-on: ubuntu-latest
    # Se agrega condición para evitar que el bot de la App genere bucles infinitos al hacer push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'automation-ruleset-bypass[bot]'
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.BYPASS_APP_ID }}
          private-key: ${{ secrets.BYPASS_APP_PRIVATE_KEY }}

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure Git Bot User
        run: |
          git config --global user.name "automation-ruleset-bypass[bot]"
          git config --global user.email "automation-ruleset-bypass[bot]@://github.com"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install Dependencies
        run: poetry install --no-interaction --no-root --all-extras

      - name: Execute Framework Versioning and Deployment
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_TOKEN }}
        run: |
          poetry run semantic-release version
          poetry build
          poetry publish
